version: '3.8'

services:
  inventory-db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: nexus_inventory
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - inventory_db_data:/var/lib/postgresql/data

  inventory-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: inventory-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  inventory-service:
    build: .
    container_name: inventory-service
    ports:
      - "8082:8082"
    depends_on:
      - inventory-db
      - inventory-rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/nexus_inventory
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: inventory-rabbitmq

volumes:
  inventory_db_data:
