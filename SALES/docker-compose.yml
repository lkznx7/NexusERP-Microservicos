version: '3.8'

services:
  nexus-sales-db:
    image: postgres:16-alpine
    container_name: nexus-sales-db
    environment:
      POSTGRES_DB: nexus_sales
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - nexus_sales_data:/var/lib/postgresql/data

  nexus-sales:
    build: .
    container_name: nexus-sales
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://nexus-sales-db:5432/nexus_sales
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - nexus-sales-db

volumes:
  nexus_sales_data:
