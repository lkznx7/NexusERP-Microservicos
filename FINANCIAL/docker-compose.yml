version: '3.8'

services:
  nexus-financial-db:
    image: postgres:16-alpine
    container_name: nexus-financial-db
    environment:
      POSTGRES_DB: nexus_financial
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - nexus_financial_data:/var/lib/postgresql/data

  nexus-financial:
    build: .
    container_name: nexus-financial
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://nexus-financial-db:5432/nexus_financial
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - nexus-financial-db

volumes:
  nexus_financial_data:
