version: '3.8'

services:
  nexus-customers-db:
    image: postgres:16-alpine
    container_name: nexus-customers-db
    environment:
      POSTGRES_DB: nexus_customers
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    volumes:
      - nexus_customers_data:/var/lib/postgresql/data

  nexus-customers:
    build: .
    container_name: nexus-customers
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://nexus-customers-db:5432/nexus_customers
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - nexus-customers-db

volumes:
  nexus_customers_data:
