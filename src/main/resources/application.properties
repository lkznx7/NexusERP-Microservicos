spring.application.name=Nexus-Auth
spring.threads.virtual.enabled=true
#credenciais jwt
app.jwt.secret=${JWT_SECRET:fa4f323ee71275d8f786c15344c47c957c68c09cfea98f7f4d7e3507e80de395}
app.jwt.expiration ${JWT_EXPIRATION:43200000}


# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/nexus_auth
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Security Configuration
spring.security.oauth2.client.registration.google.client-id=your-client-id
spring.security.oauth2.client.registration.google.client-secret=your-client-secret
